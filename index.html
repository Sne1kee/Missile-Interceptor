<!doctype html>
<!-- 2D Missile Intercept Simulator - MIT License (c) 2026 Sne1ke -->
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>2D Missile Interceptor Simulator</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div>
        <h1>Missile Interceptor</h1>
        <p class="subtitle">Missile kinematics sandbox with smart guidance</p>
      </div>
      <div class="actions">
        <button type="button" id="langEnBtn" class="lang-btn active" data-lang="en" title="English" aria-label="English">🇬🇧</button>
        <button type="button" id="langUkBtn" class="lang-btn" data-lang="uk" title="Українська" aria-label="Українська">🇺🇦</button>
        <button id="launchBtn" class="primary" data-i18n="btn_launch">Launch</button>
        <button id="resetBtn" class="ghost" data-i18n="btn_reset">Reset</button>
        <button id="centerCamBtn" class="ghost" data-i18n="btn_center_camera">Center camera</button>
      </div>
    </header>

    <main class="layout">
      <section class="canvas-wrap">
        <!-- High internal resolution for crisp graphics; CSS scales to fit -->
        <canvas id="scene" width="1600" height="960"></canvas>
        <div class="hud" id="hud"></div>
        <div class="stats" id="stats"></div>
        <div id="mobileControls" class="mobile-controls hidden">
          <button type="button" id="mobileLeft" class="mobile-arrow">⟵</button>
          <button type="button" id="mobileUp" class="mobile-arrow">⟰</button>
          <button type="button" id="mobileDown" class="mobile-arrow">⟱</button>
          <button type="button" id="mobileRight" class="mobile-arrow">⟶</button>
        </div>
      </section>

      <aside class="panel">
        <div class="sim-speed-wrap">
          <span class="tooltip" data-i18n="label_sim_speed" data-i18n-tooltip="tooltip_sim_speed" data-tooltip="">Simulation speed</span>
          <div class="target-type-switch sim-speed-switch" role="group" aria-label="Simulation speed">
            <input type="radio" name="simSpeedOpt" id="simSpeed05" value="0.5" class="target-type-radio">
            <label for="simSpeed05" class="target-type-segment" data-speed="0.5">0.5×</label>
            <input type="radio" name="simSpeedOpt" id="simSpeed1" value="1" class="target-type-radio" checked>
            <label for="simSpeed1" class="target-type-segment" data-speed="1">1×</label>
            <input type="radio" name="simSpeedOpt" id="simSpeed2" value="2" class="target-type-radio">
            <label for="simSpeed2" class="target-type-segment" data-speed="2">2×</label>
            <input type="radio" name="simSpeedOpt" id="simSpeed5" value="5" class="target-type-radio">
            <label for="simSpeed5" class="target-type-segment" data-speed="5">5×</label>
          </div>
        </div>
        <button class="panel-toggle" data-panel-target="targetPanel" data-i18n="panel_target">Target ▾</button>
        <div id="targetPanel" class="panel-section">
          <label class="field field-label-above">
            <span class="tooltip" data-i18n="label_target_type" data-i18n-tooltip="tooltip_target_type" data-tooltip="">Target type</span>
            <div class="target-type-switch" role="group" aria-label="Target type">
              <input type="radio" name="targetType" id="targetTypePlane" value="plane" checked class="target-type-radio">
              <input type="radio" name="targetType" id="targetTypeBallistic" value="ballistic" class="target-type-radio">
              <label for="targetTypePlane" class="target-type-segment" data-i18n="target_plane">Plane</label>
              <label for="targetTypeBallistic" class="target-type-segment" data-i18n="target_ballistic">Ballistic</label>
            </div>
          </label>
          <label class="field">
            <span class="tooltip" data-i18n="label_maneuver" data-i18n-tooltip="tooltip_maneuver" data-tooltip="">Maneuver</span>
            <div class="maneuver-row">
              <input id="targetManeuver" type="range" min="0" max="2" step="1" value="0">
              <span id="targetManeuverLabel">Straight</span>
            </div>
          </label>
          <p class="hint" id="targetManeuverHint">Target flies straight at constant speed.</p>
          <div id="targetPlaneFields">
            <label class="field" id="targetField1">
              <span class="tooltip" data-i18n="label_speed" data-i18n-tooltip="tooltip_speed" data-tooltip="">Speed (m/s)</span>
              <input id="targetSpeed" type="number" value="-250" step="10">
            </label>
            <label class="field" id="targetField2">
              <span class="tooltip" data-i18n="label_range" data-i18n-tooltip="tooltip_range" data-tooltip="">Range (m)</span>
              <input id="targetRange" type="number" value="30000" step="100">
            </label>
            <label class="field" id="targetField3">
              <span class="tooltip" data-i18n="label_altitude" data-i18n-tooltip="tooltip_altitude" data-tooltip="">Altitude (m)</span>
              <input id="targetAlt" type="number" value="10000" step="100">
            </label>
          </div>
          <div id="targetBallisticFields" class="hidden">
            <label class="field">
              <span class="tooltip" data-i18n="label_apogee" data-i18n-tooltip="tooltip_apogee" data-tooltip="">Ballistic missile apogee (m)</span>
              <input id="targetApogee" type="number" value="25000" step="500" min="20000">
            </label>
            <label class="field">
              <span class="tooltip" data-i18n="label_attack_coords" data-i18n-tooltip="tooltip_attack_coords" data-tooltip="">Coordinates of attack (m)</span>
              <input id="targetAttackX" type="number" value="5000" step="100">
            </label>
            <label class="field">
              <span class="tooltip" data-i18n="label_starting_deviation" data-i18n-tooltip="tooltip_starting_deviation" data-tooltip="">Starting deviation (m)</span>
              <input id="targetDeviation" type="number" value="10000" step="500">
            </label>
          </div>
          <p id="targetError" class="error" aria-live="polite"></p>
        </div>

        <button class="panel-toggle" data-panel-target="missilePanel" data-i18n="panel_missile">Missile ▾</button>
        <div id="missilePanel" class="panel-section">
          <div class="grid">
            <label class="field">
              <span class="tooltip" data-i18n="label_g_limit" data-i18n-tooltip="tooltip_g_limit" data-tooltip="">G limit</span>
              <input id="missileG" type="number" value="35" step="1">
            </label>
            <label class="field">
              <span class="tooltip" data-i18n="label_mass" data-i18n-tooltip="tooltip_mass" data-tooltip="">Mass (kg)</span>
              <input id="missileMass" type="number" value="280" step="1">
            </label>
            <label class="field">
              <span class="tooltip" data-i18n="label_primary_thrust" data-i18n-tooltip="tooltip_primary_thrust" data-tooltip="">Primary thrust (N)</span>
              <input id="primaryThrust" type="number" value="25000" step="500">
            </label>
            <label class="field">
              <span class="tooltip" data-i18n="label_primary_time" data-i18n-tooltip="tooltip_primary_time" data-tooltip="">Primary time (s)</span>
              <input id="primaryTime" type="number" value="1.9" step="0.1">
            </label>
            <label class="field">
              <span class="tooltip" data-i18n="label_secondary_thrust" data-i18n-tooltip="tooltip_secondary_thrust" data-tooltip="">Secondary thrust (N)</span>
              <input id="secondaryThrust" type="number" value="18000" step="200">
            </label>
            <label class="field">
              <span class="tooltip" data-i18n="label_secondary_time" data-i18n-tooltip="tooltip_secondary_time" data-tooltip="">Secondary time (s)</span>
              <input id="secondaryTime" type="number" value="12" step="0.1">
            </label>
            <label class="field">
              <span class="tooltip" data-i18n="label_max_speed" data-i18n-tooltip="tooltip_max_speed" data-tooltip="">Max speed (Mach)</span>
              <input id="maxMach" type="number" value="4.0" step="0.1">
            </label>
            <label class="field">
              <span class="tooltip" data-i18n="label_fuze" data-i18n-tooltip="tooltip_fuze" data-tooltip="">Proximity fuze (m)</span>
              <input id="fuzeRange" type="number" value="12" step="1">
            </label>
          </div>
        </div>

        <button class="panel-toggle" data-panel-target="guidancePanel" data-i18n="panel_guidance">Guidance ▾</button>
        <div id="guidancePanel" class="panel-section">
          <div class="grid">
            <label class="field">
              <span class="tooltip" data-i18n="label_guidance_mode" data-i18n-tooltip="tooltip_guidance_mode" data-tooltip="">Guidance mode</span>
              <select id="guidanceMode">
                <option value="constant" selected>Constant N</option>
                <option value="smart">Smart (energy-saving)</option>
              </select>
            </label>
            <label class="field">
              <span class="tooltip" data-i18n="label_nav_n" data-i18n-tooltip="tooltip_nav_n" data-tooltip="">Nav constant N</span>
              <input id="navConstant" type="number" value="4.0" step="0.1">
            </label>
            <label class="field">
              <span class="tooltip" data-i18n="label_loft_bias" data-i18n-tooltip="tooltip_loft_bias" data-tooltip="">Loft bias (deg)</span>
              <input id="loftBias" type="number" value="10" step="1">
            </label>
          </div>
        </div>
      </aside>
    </main>
    <footer class="footer">
      <span><span data-i18n="footer_author">Author</span>: Sne1ke</span>
    </footer>
  </div>

  <script src="app.js"></script>
</body>
</html>
